    :root {

      --ink: #1a1a18;
      --warm-white: #faf8f4;
      --sand: #f0ebe1;
    }

    html, body {

    }

    body {

      color: var(--ink);
      font-family: 'Josefin Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;

      font-weight: 300;
      letter-spacing: 0.12em;
      margin-bottom: 0.3rem;

      font-style: italic;
      color: var(--gold);
    }

    .divider {

      height: 1px;
      background: var(--gold);
      margin: 2rem auto;
      opacity: 0.6;
    }

    .label {

      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #888;
      line-height: 2;
      max-width: 340px;
    }

    .wa-link {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 3rem;
      padding: 0.75rem 1.8rem;
      border: 1px solid rgba(201,168,76,0.5);
      color: var(--ink);
      font-family: 'Josefin Sans', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    .wa-link:hover {
      background: var(--gold);
      color: var(--warm-white);
      border-color: var(--gold);
    }

    .location {
      margin-top: 3rem;
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #aaa;
